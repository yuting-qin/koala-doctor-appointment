name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Verify OpenAPI spec is up to date
        run: |
          ./gradlew generateOpenApiDocs --no-daemon
          if [ -n "$(git status --porcelain -- docs/openapi/openapi.yaml)" ]; then
            echo "::error::OpenAPI spec is out of date or missing. Run './gradlew clean generateOpenApiDocs' locally and commit docs/openapi/openapi.yaml."
            git diff -- docs/openapi/openapi.yaml || true
            exit 1
          fi

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
